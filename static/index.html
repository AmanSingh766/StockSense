<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📈 Stock Intelligence Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0d1117; --card: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
      --green: #3fb950; --red: #f85149; --yellow: #d29922;
      --purple: #bc8cff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }

    /* SIDEBAR */
    #sidebar { width: 260px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    #sidebar-header { padding: 18px 16px 12px; border-bottom: 1px solid var(--border); }
    #sidebar-header h2 { font-size: 16px; color: var(--accent); margin-bottom: 4px; }
    #sidebar-header p { font-size: 11px; color: var(--muted); }
    #search { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px 10px; font-size: 13px; margin: 12px 0 0; outline: none; }
    #company-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .company-item { padding: 10px 16px; cursor: pointer; display: flex; flex-direction: column; gap: 2px; border-left: 3px solid transparent; transition: all 0.15s; }
    .company-item:hover { background: #1c2128; border-left-color: var(--border); }
    .company-item.active { background: #1c2128; border-left-color: var(--accent); }
    .company-item .sym { font-size: 13px; font-weight: 600; color: var(--accent); }
    .company-item .name { font-size: 11px; color: var(--muted); }
    .company-item .price-tag { font-size: 12px; font-weight: 600; margin-top: 2px; }

    /* MAIN CONTENT */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    #topbar h1 { font-size: 18px; flex: 1; }
    #topbar h1 span { color: var(--accent); }
    .tab-btn { background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); padding: 6px 14px; font-size: 13px; cursor: pointer; transition: all 0.15s; }
    .tab-btn.active, .tab-btn:hover { background: var(--accent); color: #0d1117; border-color: var(--accent); font-weight: 600; }

    #content { flex: 1; overflow-y: auto; padding: 20px 24px; }

    /* STATS ROW */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
    .stat-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-card .value { font-size: 20px; font-weight: 700; }
    .stat-card .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* CHARTS */
    .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 20px; }
    .chart-card h3 { font-size: 14px; margin-bottom: 14px; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .chart-card h3 .badge { background: #21262d; border: 1px solid var(--border); border-radius: 4px; font-size: 11px; padding: 2px 8px; color: var(--muted); }
    .chart-wrap { position: relative; height: 260px; }

    /* RANGE BUTTONS */
    .range-btns { display: flex; gap: 6px; margin-bottom: 14px; }
    .range-btn { background: #21262d; border: 1px solid var(--border); border-radius: 4px; color: var(--muted); padding: 4px 10px; font-size: 12px; cursor: pointer; }
    .range-btn.active { background: var(--accent); color: #0d1117; border-color: var(--accent); font-weight: 600; }

    /* COMPARE */
    .compare-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .compare-row select { background: var(--card); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px 12px; font-size: 13px; outline: none; cursor: pointer; }
    .compare-row button { background: var(--accent); border: none; border-radius: 6px; color: #0d1117; padding: 8px 18px; font-size: 13px; font-weight: 700; cursor: pointer; }

    /* GAINERS/LOSERS */
    .gl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .gl-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .gl-table th { text-align: left; color: var(--muted); font-size: 11px; text-transform: uppercase; padding: 6px 10px; border-bottom: 1px solid var(--border); }
    .gl-table td { padding: 9px 10px; border-bottom: 1px solid #21262d; }
    .gl-table tr:last-child td { border-bottom: none; }
    .pct { font-weight: 700; font-size: 13px; }
    .green { color: var(--green); }
    .red { color: var(--red); }

    /* VOLATILITY */
    .vol-bar { height: 8px; border-radius: 4px; background: var(--border); margin-top: 4px; overflow: hidden; }
    .vol-bar-fill { height: 100%; border-radius: 4px; }

    /* CORRELATION */
    #corr-table-wrap { overflow-x: auto; }
    .corr-table { border-collapse: collapse; font-size: 11px; }
    .corr-table th, .corr-table td { padding: 7px 10px; text-align: center; border: 1px solid var(--border); }
    .corr-table th { background: #21262d; color: var(--muted); font-size: 10px; }
    .corr-table td { font-weight: 600; }

    /* LOADING */
    .loading { color: var(--muted); font-size: 14px; padding: 40px; text-align: center; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sidebar-header">
    <h2>📈 NSE Stocks</h2>
    <p>Indian Market Intelligence</p>
    <input id="search" type="text" placeholder="Search company..." oninput="filterCompanies(this.value)"/>
  </div>
  <div id="company-list"><div class="loading"><span class="spinner"></span>Loading...</div></div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <h1 id="page-title">Stock <span>Intelligence</span> Dashboard</h1>
    <button class="tab-btn active" onclick="switchTab('overview', this)">📊 Overview</button>
    <button class="tab-btn" onclick="switchTab('compare', this)">⚖️ Compare</button>
    <button class="tab-btn" onclick="switchTab('gainers', this)">🔥 Gainers/Losers</button>
    <button class="tab-btn" onclick="switchTab('volatility', this)">📉 Volatility</button>
    <button class="tab-btn" onclick="switchTab('correlation', this)">🤝 Correlation</button>
  </div>
  <div id="content"><div class="loading"><span class="spinner"></span>Select a company to begin</div></div>
</div>

<script>
const API = '';
let allCompanies = [];
let selectedSymbol = null;
let currentTab = 'overview';
let charts = {};

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

async function api(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ── Company List ────────────────────────────────────────────────────────────
async function loadCompanies() {
  const companies = await api('/companies');
  allCompanies = companies;
  renderCompanyList(companies);
  // load summaries for price display
  for (const c of companies) {
    api(`/summary/${c.symbol}`).then(s => {
      const el = document.querySelector(`[data-sym="${c.symbol}"] .price-tag`);
      if (el) {
        const ret = s.latest_return_pct;
        el.textContent = `₹${s.latest_close.toLocaleString('en-IN')}`;
        el.style.color = ret >= 0 ? 'var(--green)' : 'var(--red)';
        const retEl = document.querySelector(`[data-sym="${c.symbol}"] .ret-tag`);
        if (retEl) retEl.textContent = `${ret >= 0 ? '+' : ''}${ret.toFixed(2)}%`;
      }
    }).catch(() => {});
  }
}

function renderCompanyList(companies) {
  const list = document.getElementById('company-list');
  list.innerHTML = companies.map(c => `
    <div class="company-item" data-sym="${c.symbol}" onclick="selectCompany('${c.symbol}', '${c.company_name}')">
      <span class="sym">${c.symbol.replace('.NS','')}</span>
      <span class="name">${c.company_name}</span>
      <span class="price-tag">Loading...</span>
      <span class="ret-tag" style="font-size:11px;color:var(--muted)"></span>
    </div>
  `).join('');
}

function filterCompanies(q) {
  const filtered = allCompanies.filter(c =>
    c.company_name.toLowerCase().includes(q.toLowerCase()) ||
    c.symbol.toLowerCase().includes(q.toLowerCase())
  );
  renderCompanyList(filtered);
}

// ── Tab / Company Selection ─────────────────────────────────────────────────
function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (tab === 'compare') renderCompare();
  else if (tab === 'gainers') renderGainers();
  else if (tab === 'volatility') renderVolatility();
  else if (tab === 'correlation') renderCorrelation();
  else if (selectedSymbol) renderOverview(selectedSymbol);
  else document.getElementById('content').innerHTML = '<div class="loading">Select a company to view overview</div>';
}

function selectCompany(symbol, name) {
  selectedSymbol = symbol;
  document.querySelectorAll('.company-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-sym="${symbol}"]`)?.classList.add('active');
  document.getElementById('page-title').innerHTML = `${name} <span style="font-size:14px;color:var(--muted)">${symbol}</span>`;
  if (currentTab === 'overview') renderOverview(symbol);
}

// ── OVERVIEW ────────────────────────────────────────────────────────────────
let overviewDays = 30;

async function renderOverview(symbol, days) {
  if (days) overviewDays = days;
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><span class="spinner"></span>Fetching data...</div>';

  const [data, summary] = await Promise.all([
    api(`/data/${symbol}?days=${overviewDays}`),
    api(`/summary/${symbol}`)
  ]);

  const retColor = summary.latest_return_pct >= 0 ? 'var(--green)' : 'var(--red)';

  content.innerHTML = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="label">Latest Close</div>
        <div class="value">₹${summary.latest_close.toLocaleString('en-IN')}</div>
        <div class="sub" style="color:${retColor}">${summary.latest_return_pct >= 0 ? '+' : ''}${summary.latest_return_pct.toFixed(2)}% today</div>
      </div>
      <div class="stat-card">
        <div class="label">52W High</div>
        <div class="value" style="color:var(--green)">₹${summary['52_week_high'].toLocaleString('en-IN')}</div>
        <div class="sub">52-week high</div>
      </div>
      <div class="stat-card">
        <div class="label">52W Low</div>
        <div class="value" style="color:var(--red)">₹${summary['52_week_low'].toLocaleString('en-IN')}</div>
        <div class="sub">52-week low</div>
      </div>
      <div class="stat-card">
        <div class="label">7-Day MA</div>
        <div class="value">₹${summary.latest_ma7.toLocaleString('en-IN')}</div>
        <div class="sub">Moving Average</div>
      </div>
      <div class="stat-card">
        <div class="label">Volatility</div>
        <div class="value" style="font-size:16px">${summary.volatility_label}</div>
        <div class="sub">Score: ${summary.volatility_score}</div>
      </div>
      <div class="stat-card">
        <div class="label">Avg Close (52W)</div>
        <div class="value">₹${summary.avg_close.toLocaleString('en-IN')}</div>
        <div class="sub">Annual average</div>
      </div>
    </div>

    <div class="chart-card">
      <h3>📈 Price Chart <span class="badge">${symbol}</span></h3>
      <div class="range-btns">
        <button class="range-btn ${overviewDays===7?'active':''}" onclick="renderOverview('${symbol}',7)">7D</button>
        <button class="range-btn ${overviewDays===30?'active':''}" onclick="renderOverview('${symbol}',30)">30D</button>
        <button class="range-btn ${overviewDays===90?'active':''}" onclick="renderOverview('${symbol}',90)">90D</button>
        <button class="range-btn ${overviewDays===180?'active':''}" onclick="renderOverview('${symbol}',180)">180D</button>
        <button class="range-btn ${overviewDays===365?'active':''}" onclick="renderOverview('${symbol}',365)">1Y</button>
      </div>
      <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
    </div>

    <div class="chart-card">
      <h3>📊 Daily Returns (%) <span class="badge">Gain/Loss per day</span></h3>
      <div class="chart-wrap"><canvas id="returnChart"></canvas></div>
    </div>
  `;

  const labels = data.data.map(d => d.date);
  const closes = data.data.map(d => d.close);
  const ma7s = data.data.map(d => d.ma_7);
  const returns = data.data.map(d => d.daily_return);

  destroyChart('price'); destroyChart('return');
  charts['price'] = new Chart(document.getElementById('priceChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Close Price', data: closes, borderColor: '#58a6ff', backgroundColor: 'rgba(88,166,255,0.08)', borderWidth: 2, pointRadius: 0, fill: true, tension: 0.3 },
        { label: '7-Day MA', data: ma7s, borderColor: '#d29922', borderWidth: 1.5, pointRadius: 0, borderDash: [4,3], fill: false }
      ]
    },
    options: chartOpts('₹')
  });

  charts['return'] = new Chart(document.getElementById('returnChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Daily Return %',
        data: returns,
        backgroundColor: returns.map(r => r >= 0 ? 'rgba(63,185,80,0.7)' : 'rgba(248,81,73,0.7)'),
        borderRadius: 2
      }]
    },
    options: chartOpts('%')
  });
}

// ── COMPARE ──────────────────────────────────────────────────────────────────
async function renderCompare() {
  const syms = allCompanies.map(c => `<option value="${c.symbol}">${c.symbol.replace('.NS','')} — ${c.company_name}</option>`).join('');
  document.getElementById('content').innerHTML = `
    <div class="chart-card">
      <h3>⚖️ Compare Two Stocks</h3>
      <div class="compare-row">
        <select id="c1">${syms}</select>
        <select id="c2">${syms.replace('selected','')}</select>
        <select id="cdays">
          <option value="30">30 Days</option>
          <option value="60">60 Days</option>
          <option value="90">90 Days</option>
          <option value="180">180 Days</option>
        </select>
        <button onclick="runCompare()">Compare →</button>
      </div>
      <div id="compare-result"><div class="loading" style="color:var(--muted);padding:20px">Select two stocks and click Compare</div></div>
    </div>
  `;
  // pre-select different defaults
  if (allCompanies.length > 1) {
    document.getElementById('c1').value = allCompanies[0].symbol;
    document.getElementById('c2').value = allCompanies[1].symbol;
  }
}

async function runCompare() {
  const s1 = document.getElementById('c1').value;
  const s2 = document.getElementById('c2').value;
  const days = document.getElementById('cdays').value;
  if (s1 === s2) { alert('Please select two different stocks'); return; }

  document.getElementById('compare-result').innerHTML = '<div class="loading"><span class="spinner"></span>Comparing...</div>';
  const data = await api(`/compare?symbol1=${s1}&symbol2=${s2}&days=${days}`);

  const corrColor = data.correlation > 0.5 ? 'var(--green)' : data.correlation < 0 ? 'var(--red)' : 'var(--yellow)';
  const r1 = data.return_pct[s1], r2 = data.return_pct[s2];

  document.getElementById('compare-result').innerHTML = `
    <div class="stats-row" style="margin-bottom:16px">
      <div class="stat-card">
        <div class="label">Correlation</div>
        <div class="value" style="color:${corrColor}">${data.correlation}</div>
        <div class="sub">${data.correlation_label}</div>
      </div>
      <div class="stat-card">
        <div class="label">${s1.replace('.NS','')} Return</div>
        <div class="value" style="color:${r1>=0?'var(--green)':'var(--red)'}">${r1>=0?'+':''}${r1}%</div>
        <div class="sub">over ${days} days</div>
      </div>
      <div class="stat-card">
        <div class="label">${s2.replace('.NS','')} Return</div>
        <div class="value" style="color:${r2>=0?'var(--green)':'var(--red)'}">${r2>=0?'+':''}${r2}%</div>
        <div class="sub">over ${days} days</div>
      </div>
    </div>
    <div class="chart-wrap" style="height:280px"><canvas id="compareChart"></canvas></div>
  `;
  destroyChart('compare');
  charts['compare'] = new Chart(document.getElementById('compareChart'), {
    type: 'line',
    data: {
      labels: data.dates,
      datasets: [
        { label: s1.replace('.NS',''), data: data.normalized[s1], borderColor: '#58a6ff', borderWidth: 2, pointRadius: 0, fill: false, tension: 0.3 },
        { label: s2.replace('.NS',''), data: data.normalized[s2], borderColor: '#3fb950', borderWidth: 2, pointRadius: 0, fill: false, tension: 0.3 }
      ]
    },
    options: chartOpts('', 'Normalized Price (Base=100)')
  });
}

// ── GAINERS / LOSERS ─────────────────────────────────────────────────────────
async function renderGainers() {
  document.getElementById('content').innerHTML = '<div class="loading"><span class="spinner"></span>Loading...</div>';
  const data = await api('/gainers-losers?top_n=5');

  const tableRows = (arr) => arr.map(r => `
    <tr>
      <td><b>${r.symbol.replace('.NS','')}</b><br><span style="font-size:11px;color:var(--muted)">${r.company_name}</span></td>
      <td>₹${r.close.toFixed(2)}</td>
      <td class="pct ${r.daily_return>=0?'green':'red'}">${r.daily_return>=0?'+':''}${r.daily_return.toFixed(2)}%</td>
    </tr>
  `).join('');

  document.getElementById('content').innerHTML = `
    <div class="gl-grid">
      <div class="chart-card">
        <h3>🚀 Top Gainers</h3>
        <table class="gl-table">
          <thead><tr><th>Company</th><th>Price</th><th>Return</th></tr></thead>
          <tbody>${tableRows(data.top_gainers)}</tbody>
        </table>
      </div>
      <div class="chart-card">
        <h3>📉 Top Losers</h3>
        <table class="gl-table">
          <thead><tr><th>Company</th><th>Price</th><th>Return</th></tr></thead>
          <tbody>${tableRows(data.top_losers)}</tbody>
        </table>
      </div>
    </div>
  `;
}

// ── VOLATILITY ───────────────────────────────────────────────────────────────
async function renderVolatility() {
  document.getElementById('content').innerHTML = '<div class="loading"><span class="spinner"></span>Calculating...</div>';
  const data = await api('/volatility');
  const maxVol = Math.max(...data.map(d => d.volatility_score));

  document.getElementById('content').innerHTML = `
    <div class="chart-card">
      <h3>📉 Stock Volatility Ranking <span class="badge">Last 30 Days</span></h3>
      ${data.map(d => {
        const pct = (d.volatility_score / maxVol * 100).toFixed(1);
        const color = d.label.includes('Low') ? 'var(--green)' : d.label.includes('High') ? 'var(--red)' : 'var(--yellow)';
        return `
          <div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:13px">
              <span><b>${d.symbol.replace('.NS','')}</b> <span style="color:var(--muted);font-size:11px">${d.company_name}</span></span>
              <span style="color:${color}">${d.label} &nbsp; <b>${d.volatility_score}</b></span>
            </div>
            <div class="vol-bar"><div class="vol-bar-fill" style="width:${pct}%;background:${color}"></div></div>
          </div>`;
      }).join('')}
    </div>
  `;
}

// ── CORRELATION MATRIX ───────────────────────────────────────────────────────
async function renderCorrelation() {
  document.getElementById('content').innerHTML = '<div class="loading"><span class="spinner"></span>Computing matrix...</div>';
  const data = await api('/correlation-matrix?days=60');
  const syms = data.symbols.map(s => s.replace('.NS',''));

  const cellColor = v => {
    const r = Math.round((1 - v) * 128);
    const g = Math.round(v > 0 ? v * 80 : 0);
    const b = Math.round(v < 0 ? Math.abs(v) * 120 : 0);
    const alpha = Math.abs(v) * 0.7;
    if (v > 0.6) return `rgba(63,185,80,${alpha})`;
    if (v < -0.3) return `rgba(248,81,73,${alpha})`;
    return `rgba(88,166,255,${alpha * 0.4})`;
  };

  const header = `<th></th>` + syms.map(s => `<th>${s}</th>`).join('');
  const rows = data.symbols.map((s1, i) =>
    `<tr><th>${syms[i]}</th>${data.symbols.map(s2 => {
      const v = data.matrix[s1][s2];
      return `<td style="background:${cellColor(v)};color:var(--text)">${v.toFixed(2)}</td>`;
    }).join('')}</tr>`
  ).join('');

  document.getElementById('content').innerHTML = `
    <div class="chart-card">
      <h3>🤝 Correlation Matrix <span class="badge">60-Day Rolling</span></h3>
      <p style="font-size:12px;color:var(--muted);margin-bottom:14px">
        🟢 Green = High positive correlation &nbsp; 🔴 Red = Negative correlation &nbsp; Use for portfolio diversification
      </p>
      <div id="corr-table-wrap">
        <table class="corr-table"><thead><tr>${header}</tr></thead><tbody>${rows}</tbody></table>
      </div>
    </div>
  `;
}

// ── Chart defaults ───────────────────────────────────────────────────────────
function chartOpts(prefix='', yLabel='') {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { labels: { color: '#8b949e', font: { size: 12 } } } },
    scales: {
      x: { ticks: { color: '#8b949e', maxTicksLimit: 8, font: { size: 10 } }, grid: { color: '#21262d' } },
      y: {
        ticks: { color: '#8b949e', callback: v => `${prefix}${v.toLocaleString('en-IN')}`, font: { size: 10 } },
        grid: { color: '#21262d' },
        title: yLabel ? { display: true, text: yLabel, color: '#8b949e', font: { size: 11 } } : undefined
      }
    }
  };
}

// ── Init ─────────────────────────────────────────────────────────────────────
loadCompanies();
</script>
</body>
</html>
